<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI OS Pro</title>

<style>
:root {
  --bg: #0f0f0f;
  --panel: #171717;
  --border: #2a2a2a;
  --text: #fff;
  --muted: #888;
  --accent: #3b82f6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: 0.3s;
}

.sidebar.collapsed {
  width: 70px;
}

.toggle {
  padding: 15px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.mode {
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.mode:hover { background: #222; }
.mode.active { background: #333; }

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  padding: 15px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}

/* Chat */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* Messages */
.msg {
  max-width: 700px;
  padding: 14px;
  border-radius: 10px;
  animation: fade 0.25s ease;
  line-height: 1.5;
}

.user {
  background: #2a2a2a;
  align-self: flex-end;
}

.bot {
  background: #1a1a1a;
  align-self: flex-start;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Input */
.inputBox {
  padding: 15px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f1f1f;
  color: white;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  cursor: pointer;
}

/* Typing indicator */
.typing {
  font-size: 14px;
  color: var(--muted);
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity: 0.3;}
  50% {opacity: 1;}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="toggle" onclick="toggleSidebar()">☰</div>

  <div class="mode active" onclick="setMode('chat', this)">💬 Chat</div>
  <div class="mode" onclick="setMode('research', this)">🔍 Research</div>
  <div class="mode" onclick="setMode('study', this)">📚 Study</div>
</div>

<div class="main">

  <div class="header">
    <div id="modeTitle">Chat Mode</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="Message AI..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
let mode = "chat";
let typingEl = null;

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll(".mode").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("modeTitle").innerText = m.toUpperCase() + " MODE";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
  return div;
}

function showTyping() {
  typingEl = document.createElement("div");
  typingEl.className = "typing";
  typingEl.innerText = "AI is thinking...";
  document.getElementById("chat").appendChild(typingEl);
  typingEl.scrollIntoView();
}

function removeTyping() {
  if (typingEl) typingEl.remove();
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      body: JSON.stringify({ message: text, mode })
    });

    const data = await res.json();
    removeTyping();
    addMessage(data.reply, "bot");

  } catch {
    removeTyping();
    addMessage("Error occurred", "bot");
  }
}
</script>

</body>
</html>
